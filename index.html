<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coffee Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Josefin+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <div class="nav-top">
    <div class="logo">COFFEE<span>·</span>LOG</div>
    <div class="bdg">SPECIALTY</div>
    <div class="save-indicator" id="saveInd"></div>
  </div>
  <div class="tabs">
    <div class="tb on" onclick="showTab('dash',this)">대시보드</div>
    <div class="tb" onclick="showTab('beans',this)">생두 목록</div>
    <div class="tb" onclick="showTab('roasts',this)">로스팅 로그</div>
    <div class="tb" onclick="showTab('brewing',this)">브루잉</div>
    <div class="tb" onclick="showTab('wishlist',this)">구매 검토</div>
    <div class="tb" onclick="showTab('timer',this)">🔥 빈본 타이머</div>
  </div>
</div>

<div class="main">

<!-- 대시보드 -->
<div id="tab-dash" class="sec on">
  <div class="stat-row" id="dashStats"></div>
  <div class="dash-grid">
    <div class="ai-panel" id="aiPanel"></div>
    <div class="right-col" id="dashRight"></div>
  </div>
  <div class="ract-lbl">최근 활동</div>
  <div id="recentAct"></div>
</div>

<!-- 생두 목록 -->
<div id="tab-beans" class="sec">
  <div class="sh"><div class="stl">생두 목록</div><button class="btn btn-sm" onclick="openBeanForm()">+ 추가</button></div>
  <input class="search" placeholder="생두명, 원산지, 컵노트 검색..." oninput="filterBeans(this.value)">
  <div class="filters" id="originFilters"></div>
  <div class="grid" id="beanCards"></div>
</div>

<!-- 로스팅 로그 -->
<div id="tab-roasts" class="sec">
  <div class="sh"><div class="stl">로스팅 로그</div><button class="btn btn-sm" onclick="openRoastForm()">+ 추가</button></div>
  <div class="rlist" id="roastList"></div>
</div>

<!-- 브루잉 -->
<div id="tab-brewing" class="sec">
  <div class="subtabs">
    <div class="st2 on" id="bst0" onclick="showBrewSub(0)">레시피 라이브러리</div>
    <div class="st2" id="bst1" onclick="showBrewSub(1)">브루잉 기록</div>
  </div>
  <div class="subsec on" id="bsub0">
    <div class="sh"><div class="stl">레시피 라이브러리</div><button class="btn btn-sm" onclick="openRecipeForm()">+ 내 레시피</button></div>
    <div class="rlbl">공식 레시피</div>
    <div class="rg2" id="officialRecipes"></div>
    <div class="rlbl">내 레시피</div>
    <div class="rg2" id="myRecipes"></div>
    <div id="timerViews"></div>
  </div>
  <div class="subsec" id="bsub1">
    <div class="sh"><div class="stl">브루잉 기록</div><button class="btn btn-sm" onclick="openBrewLogForm()">+ 기록 추가</button></div>
    <div id="brewLogList"></div>
  </div>
</div>

<!-- 빈본 타이머 -->
<div id="tab-timer" class="sec">
  <iframe id="timerFrame" style="width:100%;height:calc(100vh - 130px);border:none;border-radius:10px;display:block;"></iframe>
</div>

<!-- 구매 검토 -->
<div id="tab-wishlist" class="sec">
  <div class="sh"><div class="stl">구매 검토</div><button class="btn btn-sm" onclick="openWishForm()">+ 추가</button></div>
  <div id="wishList"></div>
</div>

</div>

<!-- MODAL: Bean Detail -->
<div class="mo" id="moBeanDetail">
  <div class="mbox">
    <div class="mtitle" id="bdName"></div>
    <div id="bdContent"></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moBeanDetail')">닫기</button></div>
  </div>
</div>

<!-- MODAL: Bean Form -->
<div class="mo" id="moBeanForm">
  <div class="mbox">
    <div class="mtitle" id="bfTitle">생두 추가</div>
    <input type="hidden" id="bfId">
    <div class="fr"><div class="fg"><label class="fl">원두명 *</label><input class="inp" id="f_bn" placeholder="케냐 카리미쿠이 AA"></div><div class="fg"><label class="fl">원산지</label><input class="inp" id="f_bo"></div></div>
    <div class="fr"><div class="fg"><label class="fl">지역/농장</label><input class="inp" id="f_br"></div><div class="fg"><label class="fl">품종</label><input class="inp" id="f_bv"></div></div>
    <div class="fr">
      <div class="fg"><label class="fl">가공방식</label><select class="sel" id="f_bp"><option value="">선택</option><option>Washed</option><option>Natural</option><option>Honey</option><option>Anaerobic Washed</option><option>Double Fermentation Washed</option><option>Natural Cascada</option><option>Classic Honey</option><option>Red Honey</option><option>Fully Washed</option></select></div>
      <div class="fg"><label class="fl">고도(m)</label><input class="inp" id="f_ba"></div>
    </div>
    <div class="fr"><div class="fg"><label class="fl">구매처</label><input class="inp" id="f_bsh"></div><div class="fg"><label class="fl">가격(만원/kg)</label><input class="inp" type="number" step="0.01" id="f_bpr"></div></div>
    <div class="fr"><div class="fg"><label class="fl">초기재고(g)</label><input class="inp" type="number" id="f_bst"></div><div class="fg"><label class="fl">구매일</label><input class="inp" type="date" id="f_bdate"></div></div>
    <div class="fg"><label class="fl">상태</label><select class="sel" id="f_bss"><option value="">선택</option><option>재고있음</option><option>잔량부족</option><option>샘플</option><option>소진</option><option>재고량미입력</option></select></div>
    <div class="fg"><label class="fl">컵노트</label><input class="inp" id="f_bnt" placeholder="자스민, 복숭아, 꿀"></div>
    <div class="fr"><div class="fg"><label class="fl">모모스 스코어</label><input class="inp" type="number" step="0.1" id="f_bsm"></div><div class="fg"><label class="fl">원더룸 스코어</label><input class="inp" type="number" step="0.1" id="f_bsw"></div></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moBeanForm')">취소</button><button class="btn btn-sm" onclick="saveBean()">저장</button></div>
  </div>
</div>

<!-- MODAL: Roast Form -->
<div class="mo" id="moRoastForm">
  <div class="mbox">
    <div class="mtitle">로스팅 기록</div>
    <input type="hidden" id="rfId">
    <div class="fr"><div class="fg"><label class="fl">날짜 *</label><input class="inp" type="date" id="f_rd"></div><div class="fg"><label class="fl">빈본 모드</label><input class="inp" type="number" id="f_rm" placeholder="5"></div></div>
    <div class="fg"><label class="fl">생두 *</label><select class="sel" id="f_rb"><option value="">선택...</option></select></div>
    <div class="fr"><div class="fg"><label class="fl">투입량(g)</label><input class="inp" type="number" id="f_ri"></div><div class="fg"><label class="fl">배출량(g)</label><input class="inp" type="number" id="f_ro"></div></div>
    <div class="fr"><div class="fg"><label class="fl">1팝 시간</label><input class="inp" id="f_rp" placeholder="1:45"></div><div class="fg"><label class="fl">배출 시간</label><input class="inp" id="f_re" placeholder="0:46"></div></div>
    <div class="fr"><div class="fg"><label class="fl">시간 기준</label><select class="sel" id="f_rb2"><option value="">선택</option><option>잔여</option><option>진행</option></select></div><div class="fg"><label class="fl">로스팅 레벨</label><select class="sel" id="f_rl"><option value="">선택</option><option>라이트</option><option>미디엄</option><option>다크</option></select></div></div>
    <div class="fg"><label class="fl">메모/이슈</label><textarea class="ta" id="f_rn" placeholder="로스팅 중 느낌, 특이사항"></textarea></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moRoastForm')">취소</button><button class="btn btn-sm" onclick="saveRoast()">저장</button></div>
  </div>
</div>

<!-- MODAL: Recipe Form -->
<div class="mo" id="moRecipeForm">
  <div class="mbox">
    <div class="mtitle">레시피 추가</div>
    <input type="hidden" id="recId">
    <div class="fg"><label class="fl">레시피명 *</label><input class="inp" id="f_recn" placeholder="484 변형, 케냐용 레시피 등"></div>
    <div class="fr"><div class="fg"><label class="fl">원두량(g)</label><input class="inp" type="number" step="0.1" id="f_recc"></div><div class="fg"><label class="fl">물량(ml)</label><input class="inp" type="number" id="f_recw"></div></div>
    <div class="fr"><div class="fg"><label class="fl">수온(°C)</label><input class="inp" type="number" id="f_rect"></div><div class="fg"><label class="fl">분쇄도</label><input class="inp" id="f_recg" placeholder="코만단테 22클릭"></div></div>
    <div class="fg"><label class="fl">가수 비율</label><input class="inp" id="f_recwater" placeholder="백산수10:딥스골드1"></div>
    <div class="fg"><label class="fl">단계별 레시피</label><textarea class="ta" id="f_recsteps" placeholder="0:00 블룸 40g&#10;1:00 2차 80g&#10;2:00 3차 40g&#10;2:30 종료"></textarea></div>
    <div class="fg"><label class="fl">설명</label><input class="inp" id="f_recdesc"></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moRecipeForm')">취소</button><button class="btn btn-sm" onclick="saveRecipe()">저장</button></div>
  </div>
</div>

<!-- MODAL: Brew Log Form -->
<div class="mo" id="moBrewLog">
  <div class="mbox">
    <div class="mtitle">브루잉 기록</div>
    <input type="hidden" id="blId">
    <div class="fr"><div class="fg"><label class="fl">날짜</label><input class="inp" type="date" id="f_bld"></div><div class="fg"><label class="fl">생두</label><select class="sel" id="f_blbean"><option value="">선택...</option></select></div></div>
    <div class="fr"><div class="fg"><label class="fl">로스팅 배치</label><select class="sel" id="f_blroast"><option value="">선택...</option></select></div><div class="fg"><label class="fl">레시피</label><select class="sel" id="f_blrec"><option value="">선택...</option></select></div></div>
    <div class="fr"><div class="fg"><label class="fl">원두량(g)</label><input class="inp" type="number" step="0.1" id="f_blc"></div><div class="fg"><label class="fl">물량(ml)</label><input class="inp" type="number" id="f_blw"></div></div>
    <div class="fr"><div class="fg"><label class="fl">수온(°C)</label><input class="inp" type="number" id="f_blt"></div><div class="fg"><label class="fl">분쇄도</label><input class="inp" id="f_blg" placeholder="코만단테 22클릭"></div></div>
    <div class="fg"><label class="fl">가수 비율</label><input class="inp" id="f_blwater" placeholder="백산수10:딥스골드1"></div>
    <div class="fg">
      <label class="fl">맛 점수</label>
      <div class="sliders">
        <div class="slrow"><div class="sllbl">산미</div><input type="range" class="slider" min="1" max="10" value="5" id="f_bla" oninput="document.getElementById('va').textContent=this.value"><div class="slval" id="va">5</div></div>
        <div class="slrow"><div class="sllbl">향</div><input type="range" class="slider" min="1" max="10" value="5" id="f_blar" oninput="document.getElementById('vr').textContent=this.value"><div class="slval" id="vr">5</div></div>
        <div class="slrow"><div class="sllbl">맛</div><input type="range" class="slider" min="1" max="10" value="5" id="f_blta" oninput="document.getElementById('vt').textContent=this.value"><div class="slval" id="vt">5</div></div>
      </div>
    </div>
    <div class="fg"><label class="fl">안 좋은 부분</label><div class="negselector" id="negSel"></div></div>
    <div class="fg"><label class="fl">메모</label><textarea class="ta" id="f_blmemo" placeholder="마셨을 때의 느낌을 자유롭게"></textarea></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moBrewLog')">취소</button><button class="btn btn-sm" onclick="saveBrewLog()">저장</button></div>
  </div>
</div>

<!-- MODAL: Wish Form -->
<div class="mo" id="moWish">
  <div class="mbox">
    <div class="mtitle">구매 검토</div>
    <div class="fg"><label class="fl">생두명 *</label><input class="inp" id="f_wn"></div>
    <div class="fr"><div class="fg"><label class="fl">가격</label><input class="inp" id="f_wp" placeholder="3.5만원/kg"></div><div class="fg"><label class="fl">출처</label><input class="inp" id="f_ws" placeholder="모모스, 커피리브레"></div></div>
    <div class="fg"><label class="fl">URL</label><input class="inp" id="f_wu" placeholder="https://..."></div>
    <div class="fg"><label class="fl">메모</label><textarea class="ta" id="f_wm" placeholder="왜 검토하는지, 특이사항"></textarea></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moWish')">취소</button><button class="btn btn-sm" onclick="saveWish()">저장</button></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="dashboard.js"></script>
<script src="beans.js"></script>
<script src="roasts.js"></script>
<script src="brewing.js"></script>
<script src="wishlist.js"></script>
</body>
</html>
