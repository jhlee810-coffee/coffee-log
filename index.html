<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coffee Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1e252c;--bg2:#161b20;--bg3:#252d35;--bg4:#1a2028;
  --card:#161b20;--card2:#1a2028;
  --b1:#252d35;--b2:#2e3840;
  --teal:#4ecdc4;--teal2:rgba(78,205,196,.12);--teal3:rgba(78,205,196,.2);
  --amber:#ffd166;--amber2:rgba(255,209,102,.1);--amber3:rgba(255,209,102,.2);
  --coral:#ff6b6b;--coral2:rgba(255,107,107,.1);--coral3:rgba(255,107,107,.2);
  --purple:#a78bfa;--purple2:rgba(167,139,250,.1);--purple3:rgba(167,139,250,.2);
  --text:#eef2f0;--text2:#a0b8c0;--muted:#4a6070;--muted2:#6a8898;
  --green2:rgba(80,160,80,.12);--green3:rgba(80,160,80,.2);--green:#6ecf6e;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--b1);padding:0 16px;position:sticky;top:0;z-index:100;}
.nav-top{display:flex;align-items:center;gap:12px;padding:12px 0 8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);letter-spacing:0.1em;}
.logo span{color:var(--teal);}
.bdg{background:var(--teal);color:var(--bg2);font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:0.1em;}
.save-indicator{font-size:10px;color:var(--muted);margin-left:auto;letter-spacing:0.05em;}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tb{font-size:12px;padding:8px 14px;color:var(--muted);cursor:pointer;font-weight:500;border-radius:7px 7px 0 0;border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .15s;}
.tb:hover{color:var(--text2);}
.tb.on{background:var(--bg);color:var(--text);border-color:var(--b1);}

/* MAIN */
.main{padding:16px;max-width:960px;margin:0 auto;}
.sec{display:none;}.sec.on{display:block;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stl{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:0.08em;}

/* BUTTONS */
.btn{background:var(--teal);color:var(--bg2);border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.05em;transition:all .15s;}
.btn:hover{opacity:.9;}
.btn2{background:transparent;color:var(--teal);border:1px solid var(--teal3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btnd{background:var(--coral2);color:#ff8080;border:1px solid var(--coral3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-sm{padding:5px 12px;font-size:11px;}

/* INPUTS */
.inp,.sel,.ta{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:7px;color:var(--text);padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--teal);}
.inp::placeholder{color:var(--muted);}
.ta{resize:vertical;min-height:72px;}
.sel option{background:var(--bg2);}
.search{width:100%;background:var(--card);border:1px solid var(--b1);border-radius:8px;color:var(--text);padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}
.search:focus{border-color:var(--teal);}
.search::placeholder{color:var(--muted);}
.fg{margin-bottom:12px;}
.fl{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:0.07em;text-transform:uppercase;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fa{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

/* FILTERS */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fc{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--b1);color:var(--muted);background:transparent;cursor:pointer;font-weight:500;transition:all .15s;}
.fc.on{border-color:var(--teal);color:var(--teal);background:var(--teal2);}

/* BEAN CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.bcard{background:var(--card);border:1px solid var(--b1);border-top:2px solid var(--teal);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;}
.bcard:hover{background:var(--card2);border-color:var(--b2);}
.bog{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--teal);margin-bottom:5px;}
.bnm{font-family:'Josefin Sans',sans-serif;font-size:14px;color:var(--text);font-weight:600;line-height:1.35;margin-bottom:5px;letter-spacing:.01em;}
.bsub{font-size:11px;color:var(--muted);margin-bottom:9px;}
.bnote{font-size:12px;color:var(--muted2);line-height:1.55;border-top:1px solid var(--b1);padding-top:8px;font-style:italic;margin-bottom:4px;}
.bfoot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.bfmeta{font-size:11px;color:var(--muted2);}
.bfscore{font-size:11px;color:var(--amber);font-weight:600;}

/* ROAST */
.rlist{display:flex;flex-direction:column;gap:9px;}
.rcard{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;}
.rhead{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;}
.rdate{font-size:10px;color:var(--teal);background:var(--teal2);border:1px solid var(--teal3);border-radius:4px;padding:2px 9px;font-weight:600;white-space:nowrap;}
.rname{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);flex:1;line-height:1.3;}
.rlv{font-size:10px;padding:2px 9px;border-radius:4px;background:var(--amber2);color:var(--amber);border:1px solid var(--amber3);font-weight:600;}
.rstats{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
.rstats span{color:var(--text2);font-weight:500;}
.rdtr{color:var(--teal) !important;font-weight:700 !important;}
.rmemo{font-family:'Playfair Display',serif;font-size:12px;color:var(--muted);margin-top:7px;font-style:italic;line-height:1.5;}
.ract{display:flex;gap:6px;margin-top:9px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.mo.open{display:flex;}
.mbox{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:0.08em;margin-bottom:18px;}

/* DETAIL */
.ds{margin-bottom:14px;}
.dstitle{font-size:10px;color:var(--teal);letter-spacing:0.12em;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-bottom:7px;border-bottom:1px solid var(--b1);padding-bottom:4px;}
.dr{display:flex;gap:8px;margin-bottom:5px;}
.dk{font-size:11px;color:var(--muted);width:72px;flex-shrink:0;}
.dv{font-size:12px;color:var(--text2);flex:1;line-height:1.5;}

/* DASHBOARD */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:18px;}
.dc{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;text-align:center;}
.dn{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--teal);line-height:1;}
.dl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
.ract-lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:9px;}
.ri{background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.rt2{font-size:12px;color:var(--text2);flex:1;}
.rd2{font-size:10px;color:var(--muted);font-weight:500;}

/* SUBTABS */
.subtabs{display:flex;gap:5px;margin-bottom:15px;background:var(--bg2);border-radius:8px;padding:4px;}
.st2{font-size:12px;padding:7px 14px;color:var(--muted);cursor:pointer;font-weight:500;border-radius:6px;flex:1;text-align:center;transition:all .15s;}
.st2.on{background:var(--bg3);color:var(--teal);font-weight:600;}
.subsec{display:none;}.subsec.on{display:block;}

/* RECIPE CARDS */
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:500px){.rg2{grid-template-columns:1fr;}}
.rc2{background:var(--card);border:1px solid var(--b1);border-top:2px solid var(--teal);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;}
.rc2:hover{background:var(--card2);}
.rc2.am{border-top-color:var(--amber);}
.rc2.co{border-top-color:var(--coral);}
.rc2.cu{border-top-color:var(--purple);border-style:dashed;}
.rc2.add{display:flex;align-items:center;justify-content:center;min-height:110px;border-top-color:var(--purple);}
.rtype{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--teal);margin-bottom:5px;}
.rtype.am{color:var(--amber);}.rtype.co{color:var(--coral);}.rtype.cu{color:var(--purple);}
.rname2{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-weight:700;margin-bottom:6px;line-height:1.3;}
.rmeta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:7px;}
.rmeta span{color:var(--text2);font-weight:500;}
.rdesc{font-size:12px;color:var(--muted2);line-height:1.5;font-style:italic;font-family:'Playfair Display',serif;}
.rlbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}

/* TIMER VIEW */
.tv{background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-top:14px;}
.tvh{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tvn{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-weight:700;flex:1;}
.tvp{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--b1);}
.tvp span{color:var(--text2);font-weight:500;}
.wbox{background:var(--bg4);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--muted2);line-height:1.6;}
.wbox b{color:var(--text2);display:block;margin-bottom:2px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}
.steps2{display:flex;flex-direction:column;gap:6px;}
.step2{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--b1);cursor:pointer;transition:all .15s;}
.step2.ac{background:var(--bg4);border-color:var(--teal);}
.step2.dn{background:rgba(26,42,26,.5);border-color:rgba(78,205,196,.15);}
.stime2{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal);width:44px;flex-shrink:0;letter-spacing:0.05em;}
.stime2.dn{color:#2a5a4a;}
.sbar2{width:3px;height:34px;border-radius:2px;background:var(--b1);flex-shrink:0;}
.sbar2.on{background:var(--teal);}
.sinfo2{flex:1;}
.sact2{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;}
.sact2.dn{color:#3a5a4a;}
.sdtl2{font-size:11px;color:var(--muted);}
.swt2{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);width:48px;text-align:right;flex-shrink:0;letter-spacing:0.05em;}
.swt2.dn{color:#3a3020;}

/* BREW LOG */
.blcard{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.blhead{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px;}
.bldate{font-size:10px;color:var(--teal);background:var(--teal2);border:1px solid var(--teal3);border-radius:4px;padding:2px 9px;font-weight:600;white-space:nowrap;}
.blinfo{flex:1;}
.blbean{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);font-weight:700;margin-bottom:2px;}
.blchain{font-size:11px;color:var(--muted);}
.blchain span{color:var(--text2);font-weight:500;}
.blstats{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);padding:9px 0;border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);margin-bottom:10px;}
.blstats span{color:var(--text2);font-weight:500;}
.scores{display:flex;gap:12px;margin-bottom:8px;}
.scitem{display:flex;flex-direction:column;align-items:center;gap:3px;}
.scring{width:42px;height:42px;border-radius:50%;border:2px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text);}
.sclbl{font-size:10px;color:var(--muted);font-weight:500;}
.blmemo{font-family:'Playfair Display',serif;font-size:12px;color:var(--muted2);line-height:1.6;font-style:italic;}
.negtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.ntag{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--coral2);color:#ff8080;border:1px solid var(--coral3);}

/* WISH */
.wcard{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:9px;display:flex;gap:12px;}
.wmain{flex:1;}
.wname{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);font-weight:700;margin-bottom:3px;}
.wmeta{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px;}
.wmemo{font-family:'Playfair Display',serif;font-size:12px;color:var(--muted2);font-style:italic;}
.wurl{font-size:11px;color:var(--teal);text-decoration:none;display:block;margin-top:4px;word-break:break-all;}
.wact{display:flex;flex-direction:column;gap:6px;}

/* SCORE SLIDER */
.sliders{display:flex;flex-direction:column;gap:10px;}
.slrow{display:flex;align-items:center;gap:10px;}
.sllbl{font-size:12px;color:var(--muted);width:32px;}
.slider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--b2);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--teal);cursor:pointer;}
.slval{font-size:13px;font-weight:700;color:var(--teal);width:24px;text-align:right;}

/* NEG TAG SELECTOR */
.negselector{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.nts{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--b2);color:var(--muted);cursor:pointer;transition:all .15s;background:transparent;font-family:'DM Sans',sans-serif;}
.nts.on{border-color:var(--coral);color:#ff8080;background:var(--coral2);}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:34px;margin-bottom:8px;}
.empty-text{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-top">
    <div class="logo">COFFEE<span>·</span>LOG</div>
    <div class="bdg">SPECIALTY</div>
    <div class="save-indicator" id="saveInd"></div>
  </div>
  <div class="tabs">
    <div class="tb on" onclick="showTab('dash',this)">대시보드</div>
    <div class="tb" onclick="showTab('beans',this)">생두 목록</div>
    <div class="tb" onclick="showTab('roasts',this)">로스팅 로그</div>
    <div class="tb" onclick="showTab('brewing',this)">브루잉</div>
    <div class="tb" onclick="showTab('wishlist',this)">구매 검토</div>
    <div class="tb" onclick="showTab('timer',this)">🔥 빈본 타이머</div>
  </div>
</div>

<div class="main">

<!-- 대시보드 -->
<div id="tab-dash" class="sec on">
  <div class="dg" id="dashStats"></div>
  <div class="ract-lbl">최근 활동</div>
  <div id="recentAct"></div>
</div>

<!-- 생두 목록 -->
<div id="tab-beans" class="sec">
  <div class="sh"><div class="stl">생두 목록</div><button class="btn btn-sm" onclick="openBeanForm()">+ 추가</button></div>
  <input class="search" placeholder="생두명, 원산지, 컵노트 검색..." oninput="filterBeans(this.value)">
  <div class="filters" id="originFilters"></div>
  <div class="grid" id="beanCards"></div>
</div>

<!-- 로스팅 로그 -->
<div id="tab-roasts" class="sec">
  <div class="sh"><div class="stl">로스팅 로그</div><button class="btn btn-sm" onclick="openRoastForm()">+ 추가</button></div>
  <div class="rlist" id="roastList"></div>
</div>

<!-- 브루잉 -->
<div id="tab-brewing" class="sec">
  <div class="subtabs">
    <div class="st2 on" id="bst0" onclick="showBrewSub(0)">레시피 라이브러리</div>
    <div class="st2" id="bst1" onclick="showBrewSub(1)">브루잉 기록</div>
  </div>

  <!-- 레시피 라이브러리 -->
  <div class="subsec on" id="bsub0">
    <div class="sh"><div class="stl">레시피 라이브러리</div><button class="btn btn-sm" onclick="openRecipeForm()">+ 내 레시피</button></div>
    <div class="rlbl">공식 레시피</div>
    <div class="rg2" id="officialRecipes"></div>
    <div class="rlbl">내 레시피</div>
    <div class="rg2" id="myRecipes"></div>
    <div id="timerViews"></div>
  </div>

  <!-- 브루잉 기록 -->
  <div class="subsec" id="bsub1">
    <div class="sh"><div class="stl">브루잉 기록</div><button class="btn btn-sm" onclick="openBrewLogForm()">+ 기록 추가</button></div>
    <div id="brewLogList"></div>
  </div>
</div>

<!-- 빈본 타이머 -->
<div id="tab-timer" class="sec">
  <iframe src="binbon_timer.html" style="width:100%;height:calc(100vh - 130px);border:none;border-radius:10px;display:block;"></iframe>
</div>

<!-- 구매 검토 -->
<div id="tab-wishlist" class="sec">
  <div class="sh"><div class="stl">구매 검토</div><button class="btn btn-sm" onclick="openWishForm()">+ 추가</button></div>
  <div id="wishList"></div>
</div>

</div>

<!-- MODAL: Bean Detail -->
<div class="mo" id="moBeanDetail">
  <div class="mbox">
    <div class="mtitle" id="bdName"></div>
    <div id="bdContent"></div>
    <div class="fa"><button class="btn2" onclick="closeMo('moBeanDetail')">닫기</button></div>
  </div>
</div>

<!-- MODAL: Bean Form -->
<div class="mo" id="moBeanForm">
  <div class="mbox">
    <div class="mtitle" id="bfTitle">생두 추가</div>
    <input type="hidden" id="bfId">
    <div class="fr"><div class="fg"><label class="fl">원두명 *</label><input class="inp" id="f_bn" placeholder="케냐 카리미쿠이 AA"></div><div class="fg"><label class="fl">원산지</label><input class="inp" id="f_bo"></div></div>
    <div class="fr"><div class="fg"><label class="fl">지역/농장</label><input class="inp" id="f_br"></div><div class="fg"><label class="fl">품종</label><input class="inp" id="f_bv"></div></div>
    <div class="fr">

<script>
const SK='coffee_v3';
const NEG=['강한 쓴맛','역함','떫음','흙냄새','곰팡이냄새','과발효','밋밋함','텁텁함','연기냄새','너무 신맛','잡미','고무냄새','약품냄새','발효취','퀴퀴함','풀냄새','쓴 여운','금속맛','너무 진함','너무 묽음','건조함','떫은 여운','과추출','미추출','식은맛','탄맛','굽내','풋내'];

const OFFICIAL_RECIPES=[
  {id:'r_484',type:'내 메인 레시피',name:'484 레시피',coffee:15,water:240,temp:96,grind:'코만단테 22클릭',water_ratio:'백산수10:딥스골드1',desc:'40g 블룸→1분 80g→2분 40g, 2:30 종료. 백산수딥스골드75+에비앙25 기준',steps:[{time:'0:00',action:'블룸',detail:'전체 골고루 적시듯 원형 투입',water:'40g'},{time:'1:00',action:'2차 투입',detail:'중심부터 원형으로',water:'80g'},{time:'2:00',action:'3차 투입',detail:'중심부터 원형으로',water:'40g'},{time:'2:30',action:'종료',detail:'드립 완료 확인',water:'✓'}],color:''},
  {id:'r_46',type:'Tetsu Kasuya',name:'4:6 Method',coffee:20,water:300,temp:93,grind:'굵게 (프렌치프레스 수준)',water_ratio:'',desc:'앞 40%로 산미·단맛, 뒤 60%로 농도 조절. 45초 간격 5회 푸어',steps:[{time:'0:00',action:'1차 — 산미·단맛 조절',detail:'작게→달콤 / 크게→산미',water:'60g'},{time:'0:45',action:'2차 — 산미·단맛 조절',detail:'1+2차 합계 120g = 전체 40%',water:'60g'},{time:'1:30',action:'3차 — 농도 조절 시작',detail:'나머지 60% 구간 시작',water:'60g'},{time:'2:15',action:'4차',detail:'',water:'60g'},{time:'3:00',action:'5차 · 종료',detail:'3:30~4:00 완료 목표',water:'60g'}],color:'am'},
  {id:'r_switch',type:'Hario V60 Switch',name:'Switch 침지+투과',coffee:15,water:240,temp:93,grind:'미디엄-파인',water_ratio:'',desc:'스위치 닫고 블룸 → 추가투입 후 스위치 개방. 침지+투과 복합 방식',steps:[{time:'0:00',action:'블룸 (스위치 닫기)',detail:'30g 투입, 40초 대기',water:'30g'},{time:'0:40',action:'추가 투입',detail:'140g 천천히 원형 투입',water:'140g'},{time:'0:55',action:'스위치 열기',detail:'드립 시작. 1:45~2:00 완료 목표',water:'↓'},{time:'2:00',action:'종료',detail:'',water:'✓'}],color:'co'},
  {id:'r_hoffmann',type:'James Hoffmann',name:'Ultimate V60',coffee:30,water:500,temp:92,grind:'미디엄',water_ratio:'',desc:'45초 블룸 후 연속 투입+스월링. 균일추출로 클린컵 지향',steps:[{time:'0:00',action:'블룸',detail:'60g 투입, 45초 대기',water:'60g'},{time:'0:45',action:'연속 투입',detail:'0:45~1:30 사이 440g까지 투입',water:'440g'},{time:'1:30',action:'스월링',detail:'드리퍼 가볍게 스월링',water:''},{time:'3:30',action:'종료 목표',detail:'3:30~4:00 완료',water:'✓'}],color:'am'},
];

const ORIGIN_COLORS={'에티오피아':'var(--amber)','케냐':'var(--coral)','콜롬비아':'var(--purple)','에콰도르':'var(--green)','온두라스':'var(--teal)','파나마':'#c084fc','과테말라':'#fb923c','페루':'#94a3b8'};

let db=loadDB();
let cf='all',cs='';
let openTimerId=null;

function loadDB(){
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const p=JSON.parse(s);
      if(!p.beans||!p.beans.length) p.beans=INITIAL_DATA.beans;
      if(!p.roasts||!p.roasts.length) p.roasts=INITIAL_DATA.roasts;
      if(!p.recipes) p.recipes=[];
      if(!p.brewlogs) p.brewlogs=[];
      if(!p.wishlist) p.wishlist=[];
      return p;
    }
  }catch(e){}
  const d=JSON.parse(JSON.stringify(INITIAL_DATA));
  d.recipes=[];d.brewlogs=[];d.wishlist=[];
  return d;
}
function saveDB(){
  localStorage.setItem(SK,JSON.stringify(db));
  document.getElementById('saveInd').textContent='저장됨 '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function toSec(t){const p=t.split(':');return+p[0]*60+ +p[1];}

/* TABS */
function showTab(name,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  el.classList.add('on');
  const fn={dash:renderDash,beans:renderBeans,roasts:renderRoasts,brewing:renderBrewing,wishlist:renderWishlist};
  if(fn[name]) fn[name]();
}
function showBrewSub(i){
  document.querySelectorAll('.subsec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.st2').forEach(t=>t.classList.remove('on'));
  document.getElementById('bsub'+i).classList.add('on');
  document.getElementById('bst'+i).classList.add('on');
}

/* DASHBOARD */
function renderDash(){
  document.getElementById('dashStats').innerHTML=
    dC(db.beans.length,'생두')+
    dC(db.beans.filter(b=>b.status==='재고있음').length,'재고있음','teal')+
    dC(db.roasts.length,'로스팅','amber')+
    dC(db.brewlogs.length,'브루잉','coral')+
    dC(db.wishlist.length,'구매검토','purple');
  const rec=[
    ...db.roasts.slice(-5).map(r=>({date:r.date,text:'🔥 '+r.bean_name+(r.mode?' — 모드'+r.mode:'')})),
    ...db.brewlogs.slice(-3).map(b=>({date:b.date,text:'☕ '+b.bean_name+' 브루잉'})),
  ].sort((a,b)=>b.date>a.date?1:-1).slice(0,8);
  document.getElementById('recentAct').innerHTML=rec.length?
    rec.map(r=>`<div class="ri"><div class="rdot"></div><div class="rt2">${r.text}</div><div class="rd2">${r.date}</div></div>`).join(''):
    '<div class="empty"><div class="empty-icon">☕</div><div class="empty-text">아직 기록이 없습니다</div></div>';
}
function dC(n,l,c=''){const col=c==='teal'?'var(--teal)':c==='amber'?'var(--amber)':c==='coral'?'var(--coral)':c==='purple'?'var(--purple)':'var(--teal)';return`<div class="dc"><div class="dn" style="color:${col}">${n}</div><div class="dl">${l}</div></div>`;}

/* BEANS */
function renderBeans(){
  const origins=[...new Set(db.beans.map(b=>b.origin).filter(Boolean))];
  document.getElementById('originFilters').innerHTML=
    `<div class="fc ${cf==='all'?'on':''}" onclick="setF('all')">전체</div>`+
    origins.map(o=>`<div class="fc ${cf===o?'on':''}" onclick="setF('${o}')">${o}</div>`).join('');
  let beans=db.beans;
  if(cf!=='all') beans=beans.filter(b=>b.origin===cf);
  if(cs){const q=cs.toLowerCase();beans=beans.filter(b=>(b.name+b.origin+b.cup_notes+b.shop).toLowerCase().includes(q));}
  document.getElementById('beanCards').innerHTML=beans.map(b=>{
    const oc=ORIGIN_COLORS[b.origin]||'var(--teal)';
    const dateStr=b.stock_date?b.stock_date.slice(2,4)+'.'+b.stock_date.slice(5,7):'—';
    const meta=[b.shop||'—',dateStr,b.price||'—'].join('  ');
    const sc=b.score_momos||b.score_wonderroom||'';
    return `<div class="bcard" style="border-top-color:${oc}" onclick="showBeanDetail('${b.id}')">
      <div class="bog" style="color:${oc}">${b.origin||'—'}</div>
      <div class="bnm">${b.name}</div>
      <div class="bsub">${[b.variety,b.process].filter(Boolean).join(' · ')||'&nbsp;'}</div>
      ${b.cup_notes?`<div class="bnote">${b.cup_notes}</div>`:''}
      <div class="bfoot"><span class="bfmeta">${meta}</span>${sc?`<span class="bfscore">★ ${sc}</span>`:''}</div>
    </div>`;
  }).join('')||'<div class="empty"><div class="empty-icon">🫘</div><div class="empty-text">생두가 없습니다</div></div>';
}
function setF(f){cf=f;renderBeans();}
function filterBeans(q){cs=q;renderBeans();}

function showBeanDetail(id){
  const b=db.beans.find(x=>x.id===id);if(!b)return;
  const rc=db.roasts.filter(r=>r.bean_name===b.name).length;
  const bl=db.brewlogs.filter(r=>r.bean_name===b.name).length;
  document.getElementById('bdName').textContent=b.name;
  document.getElementById('bdContent').innerHTML=`
    <div class="ds"><div class="dstitle">기본 정보</div>
      ${dr('원산지',b.origin)}${dr('지역/농장',b.region)}${dr('품종',b.variety)}
      ${dr('가공방식',b.process)}${dr('고도',b.altitude?(b.altitude+'m'):'')}
      ${dr('구매처',b.shop)}${dr('가격',b.price?(b.price+'만원/kg'):'')}
      ${dr('초기재고',b.stock_initial?(b.stock_initial+'g'):'')}${dr('상태',b.status)}
    </div>
    ${(b.score_momos||b.score_wonderroom)?`<div class="ds"><div class="dstitle">스코어</div>${dr('모모스',b.score_momos)}${dr('원더룸',b.score_wonderroom)}</div>`:''}
    ${b.cup_notes?`<div class="ds"><div class="dstitle">컵노트</div><div style="font-family:'Playfair Display',serif;font-size:13px;color:var(--muted2);line-height:1.7;font-style:italic">${b.cup_notes}</div></div>`:''}
    <div class="ds"><div class="dstitle">기록</div>${dr('로스팅',rc+'회')}${dr('브루잉',bl+'회')}</div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn2" onclick="editBean('${b.id}');closeMo('moBeanDetail')">수정</button>
      <button class="btnd" onclick="deleteBean('${b.id}')">삭제</button>
    </div>`;
  openMo('moBeanDetail');
}
function dr(k,v){return v?`<div class="dr"><div class="dk">${k}</div><div class="dv">${v}</div></div>`:''}

function openBeanForm(id){
  document.getElementById('bfTitle').textContent=id?'생두 수정':'생두 추가';
  document.getElementById('bfId').value=id||'';
  const b=id?db.beans.find(x=>x.id===id):{};
  ['f_bn','f_bo','f_br','f_bv','f_ba','f_bsh','f_bpr','f_bst','f_bnt','f_bsm','f_bsw'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f_bp').value='';document.getElementById('f_bss').value='';
  if(id&&b){
    document.getElementById('f_bn').value=b.name||'';
    document.getElementById('f_bo').value=b.origin||'';
    document.getElementById('f_br').value=b.region||'';
    document.getElementById('f_bv').value=b.variety||'';
    document.getElementById('f_bp').value=b.process||'';

function renderTimerViews(){
  const allRecs=[...OFFICIAL_RECIPES,...db.recipes.map(r=>({
    ...r,color:'cu',
    steps:(r.steps_raw||'').split('\n').filter(Boolean).map(line=>{
      const m=line.match(/^(\d+:\d+)\s+(.+?)\s+(\d+g|↓|✓)?$/);
      return m?{time:m[1],action:m[2],detail:'',water:m[3]||''}:{time:'',action:line,detail:'',water:''};
    })
  }))];
  document.getElementById('timerViews').innerHTML=allRecs.map(r=>`
    <div class="tv" id="tv_${r.id}" style="display:none;">
      <div class="tvh">
        <span style="display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;background:var(--teal2);color:var(--teal);border:1px solid var(--teal3);">${r.type||'내 레시피'}</span>
        <div class="tvn">${r.name}</div>
        <button class="btn2" onclick="closeTimer('${r.id}')">✕</button>
      </div>
      <div class="tvp">
        ${r.coffee?`<span>원두 <span>${r.coffee}g</span></span>`:''}
        ${r.water?`<span>물 <span>${r.water}ml</span></span>`:''}
        ${r.temp?`<span>수온 <span>${r.temp}°C</span></span>`:''}
        ${r.grind?`<span>분쇄 <span>${r.grind}</span></span>`:''}
      </div>
      ${r.water_ratio?`<div class="wbox"><b>💧 가수 비율</b>${r.water_ratio}</div>`:''}
      <div class="steps2">
        ${(r.steps||[]).map((s,i)=>`
          <div class="step2 ${i===0?'ac':''}" onclick="tglStep(this)">
            <div class="stime2 ${i===0?'':''}'">${s.time}</div>
            <div class="sbar2 ${i===0?'on':''}"></div>
            <div class="sinfo2"><div class="sact2">${s.action}</div>${s.detail?`<div class="sdtl2">${s.detail}</div>`:''}</div>
            <div class="swt2">${s.water}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleTimer(id){
  const el=document.getElementById('tv_'+id);
  if(!el) return;
  if(openTimerId&&openTimerId!==id){
    const prev=document.getElementById('tv_'+openTimerId);
    if(prev) prev.style.display='none';
  }
  if(el.style.display==='none'||!el.style.display){
    el.style.display='block';
    openTimerId=id;
    setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  } else {
    el.style.display='none';
    openTimerId=null;
  }
}
function closeTimer(id){
  const el=document.getElementById('tv_'+id);
  if(el) el.style.display='none';
  openTimerId=null;
}
function tglStep(el){
  el.classList.toggle('dn');
  el.classList.toggle('ac');
  el.querySelector('.sbar2').classList.toggle('on');
  el.querySelector('.stime2').classList.toggle('dn');
  el.querySelector('.sact2').classList.toggle('dn');
  el.querySelector('.swt2').classList.toggle('dn');
}
